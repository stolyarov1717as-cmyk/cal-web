server {
    listen 0.0.0.0:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-роутинг: все маршруты возвращают index.html (история React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгое кэширование иммутабельных ассетов Vite (имена с хэшем)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html не кэшируем — иначе пользователи застрянут на старой версии
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip-сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;
}
